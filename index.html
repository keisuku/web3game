// Render page cards
const cardsEl = document.querySelector('.page-cards');
function renderCards() {
  cardsEl.innerHTML = '';
  pages.forEach((p,i) => {
    const card = document.createElement('div');
    card.className = 'page-card' + (p.wip ? ' wip' : '');
    const wipBadge = p.wip ? '<span class="wip-badge">設計中</span>' : '';
    card.innerHTML = `<h3>${p.id} ${p.star?'<span class="star">★</span>':''}${wipBadge}</h3><div class="role">${p.title}</div><div class="density">${p.density}</div>`;
    card.onclick = () => selectPage(i);
    cardsEl.appendChild(card);
  });
}

function selectPage(i) {
  document.querySelectorAll('.page-card').forEach(c=>c.classList.remove('sel'));
  document.querySelectorAll('.page-card')[i].classList.add('sel');
  const p = pages[i];
  const det = document.getElementById('page-detail');
  det.classList.remove('empty');
  let html = `<div class="detail-title">${p.id}: ${p.title}</div><div class="detail-purpose">${p.purpose}</div>`;
  if (p.wip) html += `<div class="hint">※ このページはまだページ設計書が未確定です。概要のみ表示しています。</div>`;
  p.panels.forEach(pn => {
    html += `<div class="panel-row"><h4>コマ${pn.n}（${pn.size}）</h4>`;
    html += `<p><span class="label">構図:</span> ${pn.comp}</p>`;
    html += `<p><span class="label">表情:</span> ${pn.expr}</p>`;
    html += `<p><span class="label">セリフ:</span> ${pn.dial}</p></div>`;
  });
  det.innerHTML = html;
}

const promptList = document.getElementById('prompt-list');
const fbList = document.getElementById('fb-list');
const ri = document.getElementById('research-input');
ri.value = localStorage.getItem('research') || '';

function renderPrompts() {
  promptList.innerHTML = '';
  pages.forEach((p,i) => {
    const div = document.createElement('div');
    div.className = 'prompt-card';
    const note = p.wip ? '<div class="hint">※ 設計書未確定のためプロンプト未生成</div>' : '';
    div.innerHTML = `<div class="page-label">${p.role}</div><h3>${p.id}: ${p.title}</h3>${note}<div class="prompt-code">${promptTexts[i]}</div><button class="copy-btn" onclick="copyPrompt(this,${i})">コピー</button>`;
    promptList.appendChild(div);
  });
}

function copyPrompt(btn, i) {
  navigator.clipboard.writeText(promptTexts[i]);
  btn.textContent = 'コピーしました';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 2000);
}

function renderFeedback() {
  fbList.innerHTML = '';
  pages.forEach(p => {
    const div = document.createElement('div');
    div.className = 'fb-item';
    div.innerHTML = `<label>${p.id}: ${p.title}</label><textarea id="fb-${currentEp}-${p.id}" placeholder="${p.id}へのフィードバック..."></textarea>`;
    fbList.appendChild(div);
  });
  pages.forEach(p => {
    const el = document.getElementById('fb-'+currentEp+'-'+p.id);
    el.value = localStorage.getItem('fb-'+currentEp+'-'+p.id) || '';
  });
}

function switchEp(id) {
  currentEp = id;
  pages = episodes[id].pages;
  promptTexts = episodes[id].promptTexts;
  document.getElementById('ep-subtitle').textContent = episodes[id].title;
  document.querySelectorAll('.ep-btn').forEach(b => b.classList.toggle('active', b.dataset.ep === id));
  renderCards();
  renderPrompts();
  renderFeedback();
  if (pages.length > 0) selectPage(0);
}

function saveResearch() {
  localStorage.setItem('research', ri.value);
  document.getElementById('research-status').textContent = '保存しました (' + new Date().toLocaleTimeString() + ')';
}

}

`;

  navigator.clipboard.writeText(txt);

}
